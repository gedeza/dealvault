<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealVault — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #09090b;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      opacity: 0.8;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .accent { color: #10B981; }
    p {
      color: #a1a1aa;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    button {
      background: #10B981;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #059669; }
    .status {
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #71717a;
      font-size: 13px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo.png" alt="DealVault" class="logo" />
    <h1>You're <span class="accent">Offline</span></h1>
    <p>
      It looks like you've lost your internet connection.
      DealVault needs a network connection to load deal room data securely.
      Check your connection and try again.
    </p>
    <button onclick="window.location.reload()">Try Again</button>
    <div class="status">
      <div class="dot"></div>
      No network connection
    </div>
  </div>
</body>
</html>
